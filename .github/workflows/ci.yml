name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: pip install fastapi uvicorn opencv-python-headless python-dotenv pydantic

      - name: Check imports
        run: python -c "import fastapi, cv2, uvicorn; print('All imports OK')"

      - name: Check app structure
        run: python -c "import os; assert os.path.exists('api.py'); assert os.path.exists('requirements.txt'); print('App structure OK')"